<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 452" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Datapath OVN-Kubernetes dentro un nodo: dal pod a br-int, ovn_cluster_router, gateway router, br-ex e la rete fisica">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-weight:400;font-size:12px}
    @media (prefers-color-scheme: dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}
  </style>
  <defs><marker id="a6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect class="bg" x="1" y="1" width="678" height="450" rx="12"/>

  <rect x="140" y="40" width="400" height="360" rx="12" fill="none" stroke="#9aa0ad" stroke-width="0.8"/>
  <text class="ts" x="160" y="60">nodo (RHCOS)</text>

  <rect x="200" y="70" width="280" height="42" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t" x="340" y="96" text-anchor="middle" fill="#2C2C2A">pod · eth0</text>
  <rect x="200" y="132" width="280" height="42" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="340" y="153" text-anchor="middle" fill="#0C447C">br-int (OVS)</text><text class="ts" x="340" y="168" text-anchor="middle" fill="#185FA5">switch logico locale al nodo</text>
  <rect x="200" y="194" width="280" height="42" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="t" x="340" y="215" text-anchor="middle" fill="#3C3489">ovn_cluster_router</text><text class="ts" x="340" y="230" text-anchor="middle" fill="#534AB7">routing distribuito fra nodi</text>
  <rect x="200" y="256" width="280" height="42" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="t" x="340" y="277" text-anchor="middle" fill="#3C3489">gateway router</text><text class="ts" x="340" y="292" text-anchor="middle" fill="#534AB7">uscita nord-sud, SNAT</text>
  <rect x="200" y="318" width="280" height="42" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t" x="340" y="339" text-anchor="middle" fill="#085041">br-ex</text><text class="ts" x="340" y="354" text-anchor="middle" fill="#0F6E56">bridge esterno → NIC fisica</text>

  <line x1="340" y1="112" x2="340" y2="130" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a6)"/>
  <line x1="340" y1="174" x2="340" y2="192" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a6)"/>
  <line x1="340" y1="236" x2="340" y2="254" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a6)"/>
  <line x1="340" y1="298" x2="340" y2="316" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a6)"/>
  <line x1="340" y1="400" x2="340" y2="418" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a6)"/>

  <rect x="140" y="420" width="400" height="24" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="ts" x="150" y="436" fill="#5F5E5A">machine network (fisica) · inter-nodo incapsulato in Geneve</text>
</svg>
