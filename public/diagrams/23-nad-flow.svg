<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="La NetworkAttachmentDefinition descrive una rete secondaria; il pod la richiede con un'annotation e ottiene l'interfaccia net1">
<style>.bg{fill:#fff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-size:12px}@media(prefers-color-scheme:dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}</style>
