<rect x="540" y="52" width="110" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="t" x="595" y="74" text-anchor="middle" fill="#0C447C">eth0</text><text class="ts" x="595" y="91" text-anchor="middle" fill="#185FA5">default</text>
<rect x="540" y="150" width="110" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/><text class="t" x="595" y="172" text-anchor="middle" fill="#633806">net1</text><text class="ts" x="595" y="189" text-anchor="middle" fill="#854F0B">dalla NAD</text>
<line x1="220" y1="130" x2="288" y2="130" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#n1)"/><text class="ts" x="254" y="122" text-anchor="middle">referenzia</text>
