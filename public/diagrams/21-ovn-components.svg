<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Pipeline OVN-Kubernetes: dall'API Kubernetes al Northbound DB, ovn-northd, Southbound DB, ovn-controller su ogni nodo e infine i flussi OVS">
<style>.bg{fill:#fff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:13px}.ts{fill:#555a66;font-size:11px}@media(prefers-color-scheme:dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}</style>
<defs><marker id="v1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round"/></marker></defs>
<rect class="bg" x="1" y="1" width="678" height="258" rx="12"/>
<text class="t" x="40" y="34" font-size="14">Dall'intento Kubernetes ai flussi OVS</text>
<rect x="30" y="60" width="120" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="t" x="90" y="82" text-anchor="middle" fill="#0C447C">API k8s</text><text class="ts" x="90" y="99" text-anchor="middle" fill="#185FA5">pod, svc, netpol</text>
<rect x="30" y="150" width="120" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="t" x="90" y="172" text-anchor="middle" fill="#0C447C">OVN-K8s</text><text class="ts" x="90" y="189" text-anchor="middle" fill="#185FA5">traduttore</text>
<rect x="185" y="150" width="110" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="t" x="240" y="172" text-anchor="middle" fill="#3C3489">NB DB</text><text class="ts" x="240" y="189" text-anchor="middle" fill="#534AB7">stato desiderato</text>
<rect x="330" y="150" width="110" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="t" x="385" y="168" text-anchor="middle" fill="#3C3489">ovn-northd</text><text class="ts" x="385" y="185" text-anchor="middle" fill="#534AB7">compila</text>
<rect x="475" y="150" width="110" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="t" x="530" y="172" text-anchor="middle" fill="#3C3489">SB DB</text><text class="ts" x="530" y="189" text-anchor="middle" fill="#534AB7">stato compilato</text>
<rect x="475" y="60" width="175" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="t" x="562" y="82" text-anchor="middle" fill="#085041">ovn-controller (ogni nodo)</text><text class="ts" x="562" y="99" text-anchor="middle" fill="#0F6E56">→ flussi OVS (br-int)</text>
<line x1="90" y1="112" x2="90" y2="148" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#v1)"/>
<line x1="150" y1="176" x2="183" y2="176" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#v1)"/>
<line x1="295" y1="176" x2="328" y2="176" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#v1)"/>
<line x1="440" y1="176" x2="473" y2="176" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#v1)"/>
<line x1="530" y1="150" x2="545" y2="114" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#v1)"/>
<text class="ts" x="340" y="238" text-anchor="middle">OVS = lo switch virtuale · OVN = l'astrazione logica che lo programma su tutti i nodi</text>
</svg>
