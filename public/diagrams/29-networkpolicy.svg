<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Con un default-deny e una regola che consente solo api verso db sulla 5432, il traffico da api e' permesso mentre da web e' bloccato">
<style>.bg{fill:#fff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:13px}.ts{fill:#555a66;font-size:11px}@media(prefers-color-scheme:dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}</style>
<defs><marker id="ok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.6" stroke-linecap="round"/></marker><marker id="no" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.6" stroke-linecap="round"/></marker></defs>
<rect class="bg" x="1" y="1" width="678" height="258" rx="12"/>
<text class="t" x="40" y="34" font-size="14">default-deny + allow: solo api → db:5432</text>
<rect x="40" y="70" width="130" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="t" x="105" y="101" text-anchor="middle" fill="#0C447C">api</text>
<rect x="40" y="160" width="130" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="t" x="105" y="191" text-anchor="middle" fill="#2C2C2A">web</text>
<rect x="500" y="115" width="140" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/><text class="t" x="570" y="140" text-anchor="middle" fill="#085041">db</text><text class="ts" x="570" y="156" text-anchor="middle" fill="#0F6E56">:5432</text>
<line x1="170" y1="96" x2="498" y2="130" stroke="#0F6E56" stroke-width="2" marker-end="url(#ok)"/><text class="ts" x="320" y="104" text-anchor="middle" fill="#0F6E56">consentito</text>
<line x1="170" y1="186" x2="498" y2="152" stroke="#993C1D" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#no)"/><text class="ts" x="320" y="196" text-anchor="middle" fill="#993C1D">bloccato (default-deny)</text>
<text class="ts" x="340" y="238" text-anchor="middle">Finché nessuna policy seleziona un pod è tutto aperto; poi la direzione diventa deny-by-default.</text>
</svg>
