<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Topologie UDN: Layer2 segmento piatto unico contro Layer3 con subnet per nodo e routing">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}
    .t{fill:#1f2430;font-weight:600;font-size:14px}
    .ts{fill:#555a66;font-weight:400;font-size:12px}
    .hd{fill:#1f2430;font-weight:600;font-size:14px}
    @media (prefers-color-scheme: dark){
      .bg{fill:#1b2030;stroke:#33384a}
      .t{fill:#e8eaf0}.ts{fill:#a7adbd}.hd{fill:#e8eaf0}
    }
  </style>
  <rect class="bg" x="1" y="1" width="678" height="338" rx="12"/>

  <text class="hd" x="175" y="34" text-anchor="middle">Layer2 — segmento piatto</text>
  <rect x="30" y="50" width="290" height="240" rx="10" fill="none" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="5 4"/>
  <rect x="50" y="74" width="250" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t" x="175" y="99" text-anchor="middle" fill="#085041">subnet unica  10.200.0.0/16</text>

  <rect x="50" y="140" width="115" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t" x="107" y="166" text-anchor="middle" fill="#085041">node-1</text>
  <text class="ts" x="107" y="186" text-anchor="middle" fill="#0F6E56">.0.5 / .0.6</text>
  <rect x="185" y="140" width="115" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t" x="242" y="166" text-anchor="middle" fill="#085041">node-2</text>
  <text class="ts" x="242" y="186" text-anchor="middle" fill="#0F6E56">.0.7 / .0.8</text>
  <line x1="165" y1="172" x2="185" y2="172" stroke="#0F6E56" stroke-width="1.5"/>

  <text class="ts" x="175" y="240" text-anchor="middle">Tutti nello stesso L2, si vedono diretti.</text>
  <text class="ts" x="175" y="258" text-anchor="middle">Ideale per VM e live-migration.</text>
  <text class="ts" x="175" y="276" text-anchor="middle">subnets: [ 10.200.0.0/16 ]</text>

  <text class="hd" x="505" y="34" text-anchor="middle">Layer3 — subnet per nodo</text>
  <rect x="360" y="50" width="290" height="240" rx="10" fill="none" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="5 4"/>

  <rect x="380" y="140" width="115" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="437" y="166" text-anchor="middle" fill="#0C447C">node-1</text>
  <text class="ts" x="437" y="186" text-anchor="middle" fill="#185FA5">10.200.0.0/24</text>
  <rect x="515" y="140" width="115" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="572" y="166" text-anchor="middle" fill="#0C447C">node-2</text>
  <text class="ts" x="572" y="186" text-anchor="middle" fill="#185FA5">10.200.1.0/24</text>

  <rect x="455" y="92" width="100" height="30" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="ts" x="505" y="111" text-anchor="middle" fill="#3C3489">router OVN</text>
  <line x1="437" y1="140" x2="490" y2="122" stroke="#185FA5" stroke-width="1.2"/>
  <line x1="572" y1="140" x2="520" y2="122" stroke="#185FA5" stroke-width="1.2"/>

  <text class="ts" x="505" y="240" text-anchor="middle">Come la pod-net default, ma isolata.</text>
  <text class="ts" x="505" y="258" text-anchor="middle">Scala meglio per workload a pod.</text>
  <text class="ts" x="505" y="276" text-anchor="middle">subnets: [{cidr, hostSubnet: 24}]</text>

  <text class="ts" x="340" y="316" text-anchor="middle">Entrambe role: Primary → i pod hanno SOLO questa rete, isolata dal default</text>
</svg>
