<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Confronto: la UDN primaria sostituisce l'interfaccia primaria eth0 con una rete isolata, mentre Multus mantiene eth0 sul default e aggiunge net1">
<style>.bg{fill:#fff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:13px}.ts{fill:#555a66;font-size:11px}@media(prefers-color-scheme:dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}</style>
<defs><marker id="u1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round"/></marker></defs>
<rect class="bg" x="1" y="1" width="678" height="278" rx="12"/>
<text class="t" x="175" y="32" text-anchor="middle" font-size="14">UDN primaria — sostituisce</text>
<rect x="60" y="90" width="110" height="70" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/><text class="t" x="115" y="122" text-anchor="middle" fill="#2C2C2A">pod</text><text class="ts" x="115" y="140" text-anchor="middle" fill="#5F5E5A">eth0</text>
<rect x="210" y="90" width="120" height="70" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/><text class="ts" x="270" y="118" text-anchor="middle" fill="#085041">UDN isolata</text><text class="ts" x="270" y="136" text-anchor="middle" fill="#0F6E56">10.200.x</text>
<line x1="170" y1="125" x2="208" y2="125" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#u1)"/>
<text class="ts" x="195" y="205" text-anchor="middle">eth0 È la rete isolata</text>
<text class="t" x="505" y="32" text-anchor="middle" font-size="14">Multus — aggiunge</text>
<rect x="380" y="90" width="100" height="90" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/><text class="t" x="430" y="120" text-anchor="middle" fill="#2C2C2A">pod</text><text class="ts" x="430" y="140" text-anchor="middle" fill="#5F5E5A">eth0 + net1</text>
<rect x="520" y="66" width="130" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="ts" x="585" y="93" text-anchor="middle" fill="#0C447C">default (eth0)</text>
<rect x="520" y="150" width="130" height="46" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/><text class="ts" x="585" y="177" text-anchor="middle" fill="#633806">secondaria (net1)</text>
<line x1="480" y1="115" x2="518" y2="90" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#u1)"/><line x1="480" y1="150" x2="518" y2="172" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#u1)"/>
<text class="ts" x="505" y="228" text-anchor="middle">la primaria resta sul default</text>
</svg>
