<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Tre modalita' di terminazione TLS di una Route: edge termina al Router, passthrough arriva cifrato al pod, reencrypt ricifra verso il pod">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-weight:400;font-size:12px}
    @media (prefers-color-scheme: dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}
  </style>
  <defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect class="bg" x="1" y="1" width="678" height="298" rx="12"/>

  <text class="th t" x="40" y="70" fill="#1f2430" font-weight="600">edge</text>
  <text class="th t" x="40" y="146" font-weight="600">passthrough</text>
  <text class="th t" x="40" y="222" font-weight="600">reencrypt</text>

  <g>
    <rect x="150" y="52" width="90" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="ts" x="195" y="76" text-anchor="middle" fill="#2C2C2A">client</text>
    <rect x="300" y="52" width="110" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="ts" x="355" y="76" text-anchor="middle" fill="#3C3489">Router</text>
    <rect x="470" y="52" width="90" height="40" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="ts" x="515" y="76" text-anchor="middle" fill="#0C447C">pod</text>
    <line x1="240" y1="72" x2="298" y2="72" stroke="#1D9E75" stroke-width="2" marker-end="url(#ar)"/><text class="ts" x="269" y="46" text-anchor="middle" fill="#0F6E56">TLS</text>
    <line x1="410" y1="72" x2="468" y2="72" stroke="#EF9F27" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ar)"/><text class="ts" x="439" y="46" text-anchor="middle" fill="#854F0B">in chiaro</text>
  </g>

  <g>
    <rect x="150" y="128" width="90" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="ts" x="195" y="152" text-anchor="middle" fill="#2C2C2A">client</text>
    <rect x="300" y="128" width="110" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="ts" x="355" y="148" text-anchor="middle" fill="#3C3489">Router</text><text class="ts" x="355" y="163" text-anchor="middle" fill="#534AB7" font-size="11">non termina</text>
    <rect x="470" y="128" width="90" height="40" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="ts" x="515" y="152" text-anchor="middle" fill="#0C447C">pod</text>
    <line x1="240" y1="148" x2="298" y2="148" stroke="#1D9E75" stroke-width="2" marker-end="url(#ar)"/>
    <line x1="410" y1="148" x2="468" y2="148" stroke="#1D9E75" stroke-width="2" marker-end="url(#ar)"/><text class="ts" x="439" y="122" text-anchor="middle" fill="#0F6E56">TLS fino al pod</text>
  </g>

  <g>
    <rect x="150" y="204" width="90" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="ts" x="195" y="228" text-anchor="middle" fill="#2C2C2A">client</text>
    <rect x="300" y="204" width="110" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="ts" x="355" y="228" text-anchor="middle" fill="#3C3489">Router</text>
    <rect x="470" y="204" width="90" height="40" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="ts" x="515" y="228" text-anchor="middle" fill="#0C447C">pod</text>
    <line x1="240" y1="224" x2="298" y2="224" stroke="#1D9E75" stroke-width="2" marker-end="url(#ar)"/><text class="ts" x="269" y="198" text-anchor="middle" fill="#0F6E56">TLS</text>
    <line x1="410" y1="224" x2="468" y2="224" stroke="#1D9E75" stroke-width="2" marker-end="url(#ar)"/><text class="ts" x="439" y="198" text-anchor="middle" fill="#0F6E56">TLS nuovo</text>
  </g>

  <text class="ts" x="150" y="284" fill="#0F6E56">— cifrato (TLS)</text>
  <text class="ts" x="300" y="284" fill="#854F0B">- - in chiaro</text>
</svg>
