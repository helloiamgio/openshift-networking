<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Le due domande ricorrenti: se serve una NIC in piu' si usa Multus, se serve un namespace isolato con rete primaria propria si usa UDN">
<style>.bg{fill:#fff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-size:12px}@media(prefers-color-scheme:dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}</style>
<defs><marker id="i1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round"/></marker></defs>
<rect class="bg" x="1" y="1" width="678" height="238" rx="12"/>
<rect x="230" y="30" width="220" height="46" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/><text class="t" x="340" y="58" text-anchor="middle" fill="#2C2C2A">cosa ti serve?</text>
<rect x="40" y="140" width="280" height="70" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/><text class="t" x="180" y="168" text-anchor="middle" fill="#633806">una NIC in più</text><text class="ts" x="180" y="188" text-anchor="middle" fill="#854F0B">→ Multus (rete secondaria)</text>
<rect x="360" y="140" width="280" height="70" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/><text class="t" x="500" y="168" text-anchor="middle" fill="#085041">namespace isolato</text><text class="ts" x="500" y="188" text-anchor="middle" fill="#0F6E56">→ UDN (rete primaria propria)</text>
<line x1="300" y1="76" x2="200" y2="138" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#i1)"/><line x1="380" y1="76" x2="480" y2="138" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#i1)"/>
<text class="ts" x="235" y="112" text-anchor="middle">interfaccia extra</text><text class="ts" x="470" y="112" text-anchor="middle">"cluster nel cluster"</text>
</svg>
