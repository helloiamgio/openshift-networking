<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Overlay e underlay: il frame del pod viene incapsulato in un pacchetto UDP Geneve che viaggia sulla rete fisica underlay e viene poi scartato">
<style>.bg{fill:#fff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-size:12px}@media(prefers-color-scheme:dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}</style>
<defs><marker id="o1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round"/></marker></defs>
<rect class="bg" x="1" y="1" width="678" height="318" rx="12"/>
<text class="t" x="40" y="32">Overlay: il traffico virtuale incapsulato dentro l'underlay fisico</text>
<rect x="40" y="50" width="600" height="86" rx="10" fill="none" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="5 4"/>
<text class="ts" x="56" y="70" fill="#0F6E56">OVERLAY (virtuale)</text>
<rect x="60" y="82" width="150" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="ts" x="135" y="106" text-anchor="middle" fill="#085041">pod A → pod B</text>
<rect x="470" y="82" width="150" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="ts" x="545" y="106" text-anchor="middle" fill="#085041">frame consegnato</text>
<rect x="250" y="80" width="180" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="ts" x="340" y="99" text-anchor="middle" fill="#3C3489">[ frame pod ]</text><text class="ts" x="340" y="115" text-anchor="middle" fill="#534AB7">dentro UDP Geneve</text>
<line x1="210" y1="102" x2="248" y2="102" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#o1)"/><line x1="430" y1="102" x2="468" y2="102" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#o1)"/>
<line x1="340" y1="124" x2="340" y2="176" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#o1)"/><text class="ts" x="360" y="154">incapsula / scarta</text>
<rect x="40" y="184" width="600" height="104" rx="10" fill="none" stroke="#5F5E5A" stroke-width="0.8"/>
<text class="ts" x="56" y="204" fill="#5F5E5A">UNDERLAY (fisico)</text>
<rect x="90" y="216" width="150" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="t" x="165" y="247" text-anchor="middle" fill="#2C2C2A">node-1</text>
<rect x="440" y="216" width="150" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="t" x="515" y="247" text-anchor="middle" fill="#2C2C2A">node-2</text>
<line x1="240" y1="242" x2="440" y2="242" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#o1)"/><text class="ts" x="340" y="234" text-anchor="middle">machine network (switch/cavi reali)</text>
</svg>
