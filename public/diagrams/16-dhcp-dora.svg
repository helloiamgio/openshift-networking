<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Scambio DHCP DORA fra il nodo client senza IP e il server DHCP: Discover, Offer, Request, Ack; piu' note su lease, reservation e relay quando il server e' su un'altra subnet">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-weight:400;font-size:12px}
    @media (prefers-color-scheme: dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}
  </style>
  <defs>
    <marker id="mr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="mt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
  <rect class="bg" x="1" y="1" width="678" height="438" rx="12"/>

  <rect x="90" y="40" width="170" height="46" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
  <text class="t" x="175" y="60" text-anchor="middle" fill="#2C2C2A">nodo (client)</text>
  <text class="ts" x="175" y="77" text-anchor="middle" fill="#5F5E5A">RHCOS · ancora senza IP</text>
  <rect x="430" y="40" width="170" height="46" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="t" x="515" y="60" text-anchor="middle" fill="#3C3489">server DHCP</text>
  <text class="ts" x="515" y="77" text-anchor="middle" fill="#534AB7">pool + opzioni (gw, DNS)</text>

  <line x1="175" y1="86" x2="175" y2="330" stroke="#9aa0ad" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="515" y1="86" x2="515" y2="330" stroke="#9aa0ad" stroke-width="1" stroke-dasharray="3 4"/>

  <text class="ts" x="345" y="112" text-anchor="middle" fill="#185FA5">1 · Discover  — "c'e' un DHCP? mi serve un IP" (broadcast, MAC)</text>
  <line x1="178" y1="120" x2="512" y2="120" stroke="#185FA5" stroke-width="1.8" marker-end="url(#mr)"/>

  <text class="ts" x="345" y="162" text-anchor="middle" fill="#0F6E56">2 · Offer  — "ti offro 10.0.5.87 + mask + gateway + DNS"</text>
  <line x1="512" y1="170" x2="178" y2="170" stroke="#0F6E56" stroke-width="1.8" marker-end="url(#mt)"/>

  <text class="ts" x="345" y="212" text-anchor="middle" fill="#185FA5">3 · Request  — "accetto proprio quell'IP"</text>
  <line x1="178" y1="220" x2="512" y2="220" stroke="#185FA5" stroke-width="1.8" marker-end="url(#mr)"/>

  <text class="ts" x="345" y="262" text-anchor="middle" fill="#0F6E56">4 · Ack  — "assegnato, e' tuo (per la durata del lease)"</text>
  <line x1="512" y1="270" x2="178" y2="270" stroke="#0F6E56" stroke-width="1.8" marker-end="url(#mt)"/>

  <text class="ts" x="175" y="312" text-anchor="middle" fill="#2C2C2A">ora configura la NIC</text>

  <rect x="40" y="348" width="600" height="76" rx="10" fill="none" stroke="#9aa0ad" stroke-width="0.8"/>
  <text class="ts" x="56" y="372" fill="#854F0B">Lease:</text><text class="ts" x="104" y="372">IP in affitto a tempo → va rinnovato; se scade e il server non risponde, il nodo lo perde.</text>
  <text class="ts" x="56" y="392" fill="#854F0B">Reservation:</text><text class="ts" x="134" y="392">stesso IP per quel MAC → consigliata per i nodi (IP stabile).</text>
  <text class="ts" x="56" y="412" fill="#534AB7">Relay:</text><text class="ts" x="104" y="412">se il server e' su un'altra subnet, il router inoltra il broadcast (ip helper-address).</text>
</svg>
