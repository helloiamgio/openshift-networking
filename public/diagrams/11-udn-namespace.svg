<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 312" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Una UDN e' la rete primaria di un namespace a livello OVN: pod e VM nello stesso namespace prendono l'IP dalla subnet della UDN e sono isolati dal namespace di default">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-weight:400;font-size:12px}
    @media (prefers-color-scheme: dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}
  </style>
  <rect class="bg" x="1" y="1" width="678" height="310" rx="12"/>
  <text class="t" x="40" y="36">La UDN e' la rete primaria del namespace — non del tipo di workload</text>

  <rect x="40" y="56" width="250" height="200" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
  <text class="t" x="56" y="82" fill="#0C447C">ns: default</text>
  <text class="ts" x="56" y="100" fill="#185FA5">pod network · 10.128.x.x</text>
  <rect x="56" y="150" width="218" height="86" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t" x="165" y="186" text-anchor="middle" fill="#2C2C2A">pod · eth0</text>
  <text class="ts" x="165" y="206" text-anchor="middle" fill="#5F5E5A">10.128.2.7</text>

  <rect x="390" y="56" width="250" height="200" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="6 4"/>
  <text class="t" x="406" y="82" fill="#085041">ns: tenant-segregato</text>
  <text class="ts" x="406" y="100" fill="#0F6E56">UDN 10.200.0.0/16 · primaria</text>
  <rect x="406" y="120" width="218" height="58" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t" x="515" y="144" text-anchor="middle" fill="#2C2C2A">pod · eth0</text>
  <text class="ts" x="515" y="163" text-anchor="middle" fill="#5F5E5A">10.200.0.5</text>
  <rect x="406" y="186" width="218" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="t" x="515" y="210" text-anchor="middle" fill="#3C3489">VM (virt-launcher) · eth0</text>
  <text class="ts" x="515" y="229" text-anchor="middle" fill="#534AB7">10.200.0.6</text>

  <line x1="340" y1="70" x2="340" y2="120" stroke="#8a8f99" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="340" y1="185" x2="340" y2="242" stroke="#8a8f99" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text class="ts" x="340" y="150" text-anchor="middle">isolati</text>
  <text class="ts" x="340" y="168" text-anchor="middle">VRF separato</text>

  <text class="ts" x="340" y="286" text-anchor="middle">Pod "puri" e VM nello stesso namespace prendono l'IP dalla UDN. Vale per qualsiasi workload.</text>
</svg>
