<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="EgressIP: i pod di un namespace escono attraverso un nodo egress-assignable con SNAT verso un IP sorgente stabile, accettato in allowlist dal sistema esterno">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-weight:400;font-size:12px}
    @media (prefers-color-scheme: dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}
  </style>
  <defs><marker id="ae" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect class="bg" x="1" y="1" width="678" height="248" rx="12"/>

  <rect x="30" y="70" width="170" height="90" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
  <text class="t" x="115" y="104" text-anchor="middle" fill="#085041">ns: tenant</text>
  <text class="ts" x="115" y="124" text-anchor="middle" fill="#0F6E56">pod con IP effimeri</text>
  <text class="ts" x="115" y="141" text-anchor="middle" fill="#0F6E56">(cambiano ad ogni restart)</text>

  <rect x="255" y="70" width="185" height="90" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="t" x="347" y="104" text-anchor="middle" fill="#3C3489">nodo egress</text>
  <text class="ts" x="347" y="124" text-anchor="middle" fill="#534AB7">egress-assignable</text>
  <text class="ts" x="347" y="141" text-anchor="middle" fill="#534AB7">SNAT → 192.168.10.50</text>

  <rect x="495" y="70" width="155" height="90" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/>
  <text class="t" x="572" y="104" text-anchor="middle" fill="#633806">sistema esterno</text>
  <text class="ts" x="572" y="124" text-anchor="middle" fill="#854F0B">firewall / DB</text>
  <text class="ts" x="572" y="141" text-anchor="middle" fill="#854F0B">allowlist: .10.50</text>

  <line x1="200" y1="115" x2="253" y2="115" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#ae)"/>
  <line x1="440" y1="115" x2="493" y2="115" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#ae)"/>

  <text class="ts" x="340" y="200" text-anchor="middle">Con EgressIP i pod escono SEMPRE con lo stesso IP sorgente stabile,</text>
  <text class="ts" x="340" y="218" text-anchor="middle">accettato in allowlist dal sistema esterno. Senza, uscirebbero con l'IP (variabile) del nodo.</text>
</svg>
