<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Plugin per reti secondarie Multus: bridge, macvlan, ipvlan e SR-IOV, con dove si agganciano e quando usarli">
<style>.bg{fill:#fff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:13px}.ts{fill:#555a66;font-size:11px}@media(prefers-color-scheme:dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}</style>
<rect class="bg" x="1" y="1" width="678" height="258" rx="12"/>
<text class="t" x="40" y="34" font-size="14">Quale plugin per la rete secondaria</text>
<rect x="30" y="60" width="150" height="150" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="t" x="105" y="90" text-anchor="middle" fill="#0C447C">bridge</text><text class="ts" x="105" y="130" text-anchor="middle" fill="#185FA5">bridge Linux</text><text class="ts" x="105" y="148" text-anchor="middle" fill="#185FA5">sul nodo</text><text class="ts" x="105" y="184" text-anchor="middle" fill="#185FA5">VLAN interne</text>
<rect x="195" y="60" width="150" height="150" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="t" x="270" y="90" text-anchor="middle" fill="#085041">macvlan</text><text class="ts" x="270" y="130" text-anchor="middle" fill="#0F6E56">MAC propri</text><text class="ts" x="270" y="148" text-anchor="middle" fill="#0F6E56">sulla NIC</text><text class="ts" x="270" y="184" text-anchor="middle" fill="#0F6E56">IP "veri", semplice</text>
<rect x="360" y="60" width="150" height="150" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="t" x="435" y="90" text-anchor="middle" fill="#3C3489">ipvlan</text><text class="ts" x="435" y="130" text-anchor="middle" fill="#534AB7">MAC condiviso</text><text class="ts" x="435" y="184" text-anchor="middle" fill="#534AB7">MAC limitati</text>
<rect x="525" y="60" width="125" height="150" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/><text class="t" x="587" y="90" text-anchor="middle" fill="#633806">SR-IOV</text><text class="ts" x="587" y="130" text-anchor="middle" fill="#854F0B">VF hardware</text><text class="ts" x="587" y="184" text-anchor="middle" fill="#854F0B">line-rate</text>
<text class="ts" x="340" y="240" text-anchor="middle">IPAM consigliato: whereabouts (assegnazione cluster-wide, niente conflitti)</text>
</svg>
