<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="L2 e' un dominio unico con switch, MAC e ARP; L3 collega subnet diverse tramite un router">
<style>.bg{fill:#fff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-size:12px}@media(prefers-color-scheme:dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}</style>
<defs><marker id="l1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round"/></marker></defs>
<rect class="bg" x="1" y="1" width="678" height="318" rx="12"/>
<text class="t" x="175" y="32" text-anchor="middle">L2 — stessa stanza (switching)</text>
<rect x="30" y="48" width="290" height="240" rx="10" fill="none" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="5 4"/>
<rect x="60" y="180" width="100" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="t" x="110" y="205" text-anchor="middle" fill="#085041">host A</text><text class="ts" x="110" y="222" text-anchor="middle" fill="#0F6E56">MAC …aa</text>
<rect x="190" y="180" width="100" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="t" x="240" y="205" text-anchor="middle" fill="#085041">host B</text><text class="ts" x="240" y="222" text-anchor="middle" fill="#0F6E56">MAC …bb</text>
<rect x="115" y="96" width="120" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="t" x="175" y="121" text-anchor="middle" fill="#3C3489">switch</text>
<line x1="110" y1="180" x2="150" y2="136" stroke="#8a8f99" stroke-width="1.2"/><line x1="240" y1="180" x2="200" y2="136" stroke="#8a8f99" stroke-width="1.2"/>
<text class="ts" x="175" y="262" text-anchor="middle">stessa subnet · ARP · diretto</text>
<text class="t" x="505" y="32" text-anchor="middle">L3 — stanze diverse (routing)</text>
<rect x="360" y="48" width="290" height="240" rx="10" fill="none" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="5 4"/>
<rect x="380" y="180" width="115" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="t" x="437" y="203" text-anchor="middle" fill="#0C447C">subnet A</text><text class="ts" x="437" y="220" text-anchor="middle" fill="#185FA5">10.0.1.0/24</text>
<rect x="515" y="180" width="115" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="t" x="572" y="203" text-anchor="middle" fill="#0C447C">subnet B</text><text class="ts" x="572" y="220" text-anchor="middle" fill="#185FA5">10.0.2.0/24</text>
<rect x="455" y="96" width="100" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="t" x="505" y="121" text-anchor="middle" fill="#3C3489">router</text>
<line x1="437" y1="180" x2="490" y2="136" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#l1)"/><line x1="572" y1="180" x2="520" y2="136" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#l1)"/>
<text class="ts" x="505" y="262" text-anchor="middle">subnet diverse · gateway · routing</text>
</svg>
