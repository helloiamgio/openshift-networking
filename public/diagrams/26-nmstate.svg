<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 250" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="NMState: la NodeNetworkConfigurationPolicy descrive lo stato desiderato, l'operator lo applica ai nodi selezionati, NNS mostra lo stato reale e NNCE il risultato per nodo">
<style>.bg{fill:#fff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:13px}.ts{fill:#555a66;font-size:11px}@media(prefers-color-scheme:dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}</style>
<defs><marker id="s1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round"/></marker></defs>
<rect class="bg" x="1" y="1" width="678" height="248" rx="12"/>
<text class="t" x="40" y="34" font-size="14">Configurare la rete dei nodi in modo dichiarativo</text>
<rect x="30" y="90" width="150" height="70" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/><text class="t" x="105" y="118" text-anchor="middle" fill="#0C447C">NNCP</text><text class="ts" x="105" y="138" text-anchor="middle" fill="#185FA5">stato desiderato</text>
<rect x="240" y="90" width="170" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/><text class="t" x="325" y="118" text-anchor="middle" fill="#3C3489">NMState Operator</text><text class="ts" x="325" y="138" text-anchor="middle" fill="#534AB7">applica (nodeSelector)</text>
<rect x="470" y="60" width="180" height="50" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/><text class="t" x="560" y="82" text-anchor="middle" fill="#085041">nodi</text><text class="ts" x="560" y="99" text-anchor="middle" fill="#0F6E56">bridge/VLAN configurati</text>
<rect x="470" y="130" width="180" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/><text class="ts" x="560" y="152" text-anchor="middle" fill="#2C2C2A">NNS = stato reale (RO)</text><text class="ts" x="560" y="169" text-anchor="middle" fill="#5F5E5A">NNCE = esito per nodo</text>
<line x1="180" y1="125" x2="238" y2="125" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#s1)"/>
<line x1="410" y1="115" x2="468" y2="92" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#s1)"/>
<line x1="410" y1="140" x2="468" y2="152" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#s1)"/>
<text class="ts" x="340" y="228" text-anchor="middle">Applica prima su un nodo di test, verifica l'NNCE, poi estendi.</text>
</svg>
