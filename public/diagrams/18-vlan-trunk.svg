<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="VLAN: due reti logiche separate sullo stesso switch, porte access senza tag e trunk 802.1Q che trasporta piu' VLAN taggate">
<style>.bg{fill:#fff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-size:12px}@media(prefers-color-scheme:dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}</style>
<rect class="bg" x="1" y="1" width="678" height="298" rx="12"/>
<text class="t" x="40" y="34">Una VLAN = un dominio L2 separato sullo stesso switch fisico</text>
<rect x="60" y="60" width="120" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text class="t" x="120" y="80" text-anchor="middle" fill="#0C447C">host VLAN 10</text><text class="ts" x="120" y="97" text-anchor="middle" fill="#185FA5">access (no tag)</text>
<rect x="60" y="190" width="120" height="46" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/><text class="t" x="120" y="210" text-anchor="middle" fill="#633806">host VLAN 20</text><text class="ts" x="120" y="227" text-anchor="middle" fill="#854F0B">access (no tag)</text>
<rect x="260" y="110" width="120" height="76" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/><text class="t" x="320" y="145" text-anchor="middle" fill="#3C3489">switch</text><text class="ts" x="320" y="164" text-anchor="middle" fill="#534AB7">VLAN 10 + 20</text>
<line x1="180" y1="83" x2="258" y2="130" stroke="#185FA5" stroke-width="1.4"/><line x1="180" y1="213" x2="258" y2="166" stroke="#854F0B" stroke-width="1.4"/>
<rect x="470" y="110" width="150" height="76" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/><text class="t" x="545" y="140" text-anchor="middle" fill="#2C2C2A">altro switch / NIC</text><text class="ts" x="545" y="160" text-anchor="middle" fill="#5F5E5A">riceve 10 e 20</text>
<line x1="380" y1="148" x2="468" y2="148" stroke="#534AB7" stroke-width="2.4"/><text class="ts" x="424" y="140" text-anchor="middle" fill="#534AB7">trunk 802.1Q</text><text class="ts" x="424" y="176" text-anchor="middle">(VLAN taggate)</text>
<text class="ts" x="340" y="280" text-anchor="middle">La VLAN è fisica/infrastrutturale: vive su switch e NIC. Non è un overlay.</text>
</svg>
