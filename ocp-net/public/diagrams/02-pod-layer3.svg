  <text class="ts" x="560" y="200" text-anchor="middle" fill="#185FA5">10.128.4.0/23</text>

  <line x1="200" y1="188" x2="260" y2="188" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="420" y1="188" x2="480" y2="188" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text class="ts" x="230" y="180" text-anchor="middle">Geneve</text>
  <text class="ts" x="450" y="180" text-anchor="middle">Geneve</text>

  <line x1="120" y1="220" x2="120" y2="266" stroke="#8a8f99" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="340" y1="220" x2="340" y2="266" stroke="#8a8f99" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="560" y1="220" x2="560" y2="266" stroke="#8a8f99" stroke-width="1" stroke-dasharray="3 3"/>

  <rect x="40" y="268" width="600" height="58" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t" x="60" y="291" fill="#2C2C2A">Machine network (rete fisica dei nodi)</text>
  <text class="ts" x="60" y="310" fill="#5F5E5A">Locale = L2 per nodo · inter-nodo = routing OVN + incapsulamento Geneve</text>
