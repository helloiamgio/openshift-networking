<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Pod network Layer3: il blocco /14 viene affettato in /23 per nodo, routing inter-nodo via Geneve">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}
    .t{fill:#1f2430;font-weight:600;font-size:14px}
    .ts{fill:#555a66;font-weight:400;font-size:12px}
    @media (prefers-color-scheme: dark){
      .bg{fill:#1b2030;stroke:#33384a}
      .t{fill:#e8eaf0}.ts{fill:#a7adbd}
    }
  </style>
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
  <rect class="bg" x="1" y="1" width="678" height="358" rx="12"/>

  <rect x="120" y="24" width="440" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="t" x="340" y="44" text-anchor="middle" fill="#3C3489">clusterNetwork  10.128.0.0/14</text>
  <text class="ts" x="340" y="61" text-anchor="middle" fill="#534AB7">hostPrefix /23  →  510 IP per nodo, fino a 510 nodi</text>

  <line x1="200" y1="70" x2="120" y2="150" stroke="#8a8f99" stroke-width="1" marker-end="url(#a2)"/>
  <line x1="340" y1="70" x2="340" y2="150" stroke="#8a8f99" stroke-width="1" marker-end="url(#a2)"/>
  <line x1="480" y1="70" x2="560" y2="150" stroke="#8a8f99" stroke-width="1" marker-end="url(#a2)"/>

  <rect x="40" y="156" width="160" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="120" y="180" text-anchor="middle" fill="#0C447C">node-1</text>
  <text class="ts" x="120" y="200" text-anchor="middle" fill="#185FA5">10.128.0.0/23</text>

  <rect x="260" y="156" width="160" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="340" y="180" text-anchor="middle" fill="#0C447C">node-2</text>
  <text class="ts" x="340" y="200" text-anchor="middle" fill="#185FA5">10.128.2.0/23</text>

  <rect x="480" y="156" width="160" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
