<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Ordine di valutazione delle policy di rete: AdminNetworkPolicy, poi NetworkPolicy di namespace, infine BaselineAdminNetworkPolicy come guardrail">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-weight:400;font-size:12px}
    @media (prefers-color-scheme: dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}
  </style>
  <defs><marker id="a9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect class="bg" x="1" y="1" width="678" height="338" rx="12"/>
  <text class="t" x="40" y="34">Ordine di valutazione (dall'alto verso il basso)</text>

  <rect x="60" y="56" width="560" height="66" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
  <text class="t" x="80" y="82" fill="#3C3489">AdminNetworkPolicy (ANP)</text>
  <text class="ts" x="80" y="102" fill="#534AB7">cluster-scoped · priorità numerica · azioni Allow / Deny / Pass · vince sul resto</text>

  <rect x="60" y="140" width="560" height="66" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
  <text class="t" x="80" y="166" fill="#0C447C">NetworkPolicy (namespace)</text>
  <text class="ts" x="80" y="186" fill="#185FA5">per namespace · selettori pod/namespace · default-deny + allow espliciti</text>

  <rect x="60" y="224" width="560" height="66" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
  <text class="t" x="80" y="250" fill="#2C2C2A">BaselineAdminNetworkPolicy (BANP)</text>
  <text class="ts" x="80" y="270" fill="#5F5E5A">cluster-scoped · una sola · guardrail di default se nulla decide prima</text>

  <line x1="340" y1="122" x2="340" y2="138" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#a9)"/>
  <line x1="340" y1="206" x2="340" y2="222" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#a9)"/>
</svg>
