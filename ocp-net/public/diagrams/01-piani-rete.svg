<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Piani di rete OpenShift: machine network fisica con overlay pod, service e UDN">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}
    .t{fill:#1f2430;font-weight:600;font-size:14px}
    .ts{fill:#555a66;font-weight:400;font-size:12px}
    .arr{stroke:#8a8f99;stroke-width:1;stroke-dasharray:3 3}
    @media (prefers-color-scheme: dark){
      .bg{fill:#1b2030;stroke:#33384a}
      .t{fill:#e8eaf0}
      .ts{fill:#a7adbd}
    }
  </style>
  <rect class="bg" x="1" y="1" width="678" height="378" rx="12"/>

  <rect x="50" y="20" width="580" height="40" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="t" x="62" y="38" fill="#633806">Service network — 172.30.0.0/16</text>
  <text class="ts" x="62" y="54" fill="#854F0B">VIP virtuali · nessuna interfaccia di rete reale</text>

  <rect x="50" y="70" width="260" height="175" rx="12" fill="none" stroke="#9aa0ad" stroke-width="0.8"/>
  <text class="t" x="62" y="98">node-1</text>
  <text class="ts" x="132" y="98">eth0: 10.0.0.11</text>
  <rect x="68" y="120" width="224" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="180" y="140" text-anchor="middle" fill="#0C447C">pod-net (default)</text>
  <text class="ts" x="180" y="158" text-anchor="middle" fill="#185FA5">10.128.0.0/23</text>
  <rect x="68" y="180" width="224" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t" x="180" y="200" text-anchor="middle" fill="#085041">UDN: tenant-segregato</text>
  <text class="ts" x="180" y="218" text-anchor="middle" fill="#0F6E56">10.200.0.0/24</text>

  <rect x="370" y="70" width="260" height="175" rx="12" fill="none" stroke="#9aa0ad" stroke-width="0.8"/>
  <text class="t" x="382" y="98">node-2</text>
  <text class="ts" x="452" y="98">eth0: 10.0.0.12</text>
  <rect x="388" y="120" width="224" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="500" y="140" text-anchor="middle" fill="#0C447C">pod-net (default)</text>
  <text class="ts" x="500" y="158" text-anchor="middle" fill="#185FA5">10.128.2.0/23</text>
  <rect x="388" y="180" width="224" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t" x="500" y="200" text-anchor="middle" fill="#085041">UDN: tenant-segregato</text>
  <text class="ts" x="500" y="218" text-anchor="middle" fill="#0F6E56">10.200.1.0/24</text>

  <line x1="292" y1="145" x2="388" y2="145" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="292" y1="205" x2="388" y2="205" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text class="ts" x="340" y="178" text-anchor="middle">Geneve</text>

  <line class="arr" x1="180" y1="245" x2="180" y2="284"/>
  <line class="arr" x1="500" y1="245" x2="500" y2="284"/>

  <rect x="50" y="285" width="580" height="54" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t" x="62" y="308" fill="#2C2C2A">Machine network — 10.0.0.0/16</text>
  <text class="ts" x="62" y="326" fill="#5F5E5A">Unica rete fisica reale · vSphere port group</text>
</svg>
