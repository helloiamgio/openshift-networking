<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Flusso di un Service ClusterIP: il client contatta il VIP, OVN bilancia verso i pod di backend senza kube-proxy">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-weight:400;font-size:12px}
    @media (prefers-color-scheme: dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}
  </style>
  <defs><marker id="a7" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect class="bg" x="1" y="1" width="678" height="318" rx="12"/>

  <rect x="40" y="130" width="130" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
  <text class="t" x="105" y="156" text-anchor="middle" fill="#2C2C2A">client pod</text>
  <text class="ts" x="105" y="174" text-anchor="middle" fill="#5F5E5A">chiama il Service</text>

  <rect x="250" y="120" width="180" height="80" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
  <text class="t" x="340" y="150" text-anchor="middle" fill="#085041">Service (ClusterIP)</text>
  <text class="ts" x="340" y="170" text-anchor="middle" fill="#0F6E56">VIP 172.30.x.x</text>
  <text class="ts" x="340" y="186" text-anchor="middle" fill="#0F6E56">load-balancer OVN</text>

  <rect x="520" y="46" width="130" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="585" y="76" text-anchor="middle" fill="#0C447C">pod-a</text>
  <rect x="520" y="135" width="130" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="585" y="165" text-anchor="middle" fill="#0C447C">pod-b</text>
  <rect x="520" y="224" width="130" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="585" y="254" text-anchor="middle" fill="#0C447C">pod-c</text>

  <line x1="170" y1="160" x2="248" y2="160" stroke="#8a8f99" stroke-width="1.4" marker-end="url(#a7)"/>
  <line x1="430" y1="150" x2="518" y2="80" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a7)"/>
  <line x1="430" y1="160" x2="518" y2="160" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a7)"/>
  <line x1="430" y1="170" x2="518" y2="240" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a7)"/>

  <text class="ts" x="340" y="296" text-anchor="middle">OVN-Kubernetes non usa kube-proxy: il bilanciamento è nel datapath OVN</text>
</svg>
