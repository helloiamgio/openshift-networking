<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Opzioni di rete per una VM in OpenShift Virtualization: interfaccia masquerade sulla pod network oppure bridge o localnet verso una VLAN fisica">
  <style>
    .bg{fill:#ffffff;stroke:#e5e7eb}.t{fill:#1f2430;font-weight:600;font-size:14px}.ts{fill:#555a66;font-weight:400;font-size:12px}
    @media (prefers-color-scheme: dark){.bg{fill:#1b2030;stroke:#33384a}.t{fill:#e8eaf0}.ts{fill:#a7adbd}}
  </style>
  <defs><marker id="a10" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8f99" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect class="bg" x="1" y="1" width="678" height="318" rx="12"/>

  <rect x="40" y="110" width="150" height="90" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
  <text class="t" x="115" y="150" text-anchor="middle" fill="#2C2C2A">VM</text>
  <text class="ts" x="115" y="170" text-anchor="middle" fill="#5F5E5A">virt-launcher pod</text>

  <rect x="360" y="42" width="280" height="70" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t" x="500" y="70" text-anchor="middle" fill="#0C447C">masquerade → pod network</text>
  <text class="ts" x="500" y="90" text-anchor="middle" fill="#185FA5">NAT su default · semplice · Service/DNS</text>

  <rect x="360" y="130" width="280" height="70" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t" x="500" y="158" text-anchor="middle" fill="#085041">UDN Layer2 (primaria)</text>
  <text class="ts" x="500" y="178" text-anchor="middle" fill="#0F6E56">IP stabile · live-migration</text>

  <rect x="360" y="218" width="280" height="70" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="t" x="500" y="246" text-anchor="middle" fill="#633806">bridge / localnet → VLAN</text>
  <text class="ts" x="500" y="266" text-anchor="middle" fill="#854F0B">L2 sulla rete fisica esistente</text>

  <line x1="190" y1="140" x2="358" y2="80" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a10)"/>
  <line x1="190" y1="155" x2="358" y2="165" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a10)"/>
  <line x1="190" y1="170" x2="358" y2="252" stroke="#8a8f99" stroke-width="1.2" marker-end="url(#a10)"/>
</svg>
