stages: [build, deploy]

build:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  artifacts:
    paths: [dist]
    expire_in: 1 hour

deploy:
  stage: deploy
  image: node:20
  needs: [build]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - npx wrangler@3 pages deploy dist --project-name=openshift-networking
  # Variabili CI/CD richieste: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
